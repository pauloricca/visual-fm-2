services:
  web:
    build:
      context: .
    ports:
      - "${VISUAL_FM_HOST_PORT:-5174}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VISUAL_VISUAL_HTTPS_KEY: "${VISUAL_VISUAL_HTTPS_KEY:-}"
      VISUAL_VISUAL_HTTPS_CERT: "${VISUAL_VISUAL_HTTPS_CERT:-}"
      VITE_VISUAL_VISUAL_PATCH_STORAGE: "${VITE_VISUAL_VISUAL_PATCH_STORAGE:-local}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev

volumes:
  node_modules:
